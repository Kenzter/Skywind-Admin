<!DOCTYPE html>
<html>
<head>
    <title>Request Management</title>
    <link rel="stylesheet" href="request.css">
</head>

<body>
  <div class="loader">
    <img src="logo.png" alt="Loading Logo">
  </div>
  
<header>
    <img class="logo" src="logo.png">
    <nav class="navbar">
        <ul>
            <li><a href="home.html">HOME</a></li>
            <li><a href="schedule.html">SCHEDULE</a></li>
            <li><a href="request.html">REQUEST</a></li>
            <li><a href="personal.html">PERSONAL</a></li>
            <li><a href="logout.html">LOG OUT</a></li>
        </ul>
    </nav>
</header>

<div class="request">
    <div class="requestbox">
        <h2>USER REQUESTS</h2>

        <div id="message-box"></div>

        <div id="requests-container">
            <p style="color:#003d6f; font-size:16px;">Loading requests...</p>
        </div>

    </div>
</div>

<script type="module">
import {
    requireAuth,
    fetchRequests,
    acceptRequest,
    rejectRequest,
    sendSMS,
} from "./firebase-admin.js";

requireAuth(async () => {
    await loadRequests();
});

const messageBox = document.getElementById("message-box");

function showMessage(msg, type = "success") {
    messageBox.innerHTML = `<div class="message-box ${type}-message">${msg}</div>`;
    setTimeout(() => { messageBox.innerHTML = ""; }, 5000);
}

async function loadRequests() {
    const container = document.getElementById("requests-container");

    try {
        const requests = await fetchRequests();

        if (requests.length === 0) {
            container.innerHTML = `
                <div class="no-requests">
                    <p>No pending requests found in skywinddata table.</p>
                    <p>This could mean:</p>
                    <ul>
                        <li>The table is empty</li>
                        <li>All requests have been processed</li>
                        <li>There's a database connection issue</li>
                    </ul>
                </div>`;
            return;
        }

        // Build the exact same table structure as request.php
        let rows = "";
        requests.forEach((req) => {
            rows += `
                <tr>
                    <td>${escHtml(req.name)}</td>
                    <td>${escHtml(req.email)}</td>
                    <td>${escHtml(req.contact)}</td>
                    <td>${escHtml(req.address)}</td>
                    <td>${escHtml(req.service)}</td>
                    <td>${escHtml(req.units)}</td>
                    <td>${escHtml(req.aircontype)}</td>
                    <td>${escHtml(req.date_time)}</td>
                    <td>${escHtml(req.note)}</td>
                    <td>
                        <form class="action-form" data-key="${escHtml(req._key)}">
                            <button type="button" class="action-btn accept-btn"
                                onclick="handleAccept('${escHtml(req._key)}')">Accept</button>
                            <button type="button" class="action-btn reject-btn"
                                onclick="handleReject('${escHtml(req._key)}')">Reject</button>
                        </form>
                    </td>
                </tr>`;
        });

        container.innerHTML = `
            <table class="request-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Contact</th>
                        <th>Address</th>
                        <th>Service</th>
                        <th>Units</th>
                        <th>Type</th>
                        <th>Date</th>
                        <th>Note</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;

    } catch (err) {
        container.innerHTML = `<div class="error-message"><strong>Error:</strong> ${err.message}</div>`;
    }
}

// Accept: move booking → schedule, send SMS, reload
window.handleAccept = async function (bookingKey) {
    try {
        // Re-fetch to get the full data for this key
        const requests   = await fetchRequests();
        const bookingData = requests.find((r) => r._key === bookingKey);

        if (!bookingData) {
            showMessage("Request not found.", "error");
            return;
        }

        await acceptRequest(bookingKey, bookingData);

        // Send SMS (mirrors original PHP behaviour)
        const smsResult = await sendSMS(
            bookingData.contact,
            bookingData.name,
            bookingData.service,
            bookingData.date_time
        );

        const smsStatus = smsResult.success
            ? "SMS notification sent successfully."
            : `Warning: SMS failed to send - ${smsResult.error}`;

        // Store flash message for schedule page (same as PHP session flash)
        sessionStorage.setItem(
            "request_message",
            `Request from ${bookingData.name} has been accepted and moved to schedule. ${smsStatus}`
        );

        window.location.href = "schedule.html";

    } catch (err) {
        showMessage("Failed to accept request: " + err.message, "error");
    }
};

// Reject: delete booking, reload list
window.handleReject = async function (bookingKey) {
    try {
        const requests    = await fetchRequests();
        const bookingData = requests.find((r) => r._key === bookingKey);
        const contactId   = bookingData ? bookingData.contact : bookingKey;

        await rejectRequest(bookingKey);
        showMessage(`Request with contact #${contactId} has been rejected.`);
        await loadRequests();
    } catch (err) {
        showMessage("Failed to reject request: " + err.message, "error");
    }
};

// XSS guard
function escHtml(str) {
    if (str == null) return "";
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}
</script>

</body>
</html>
